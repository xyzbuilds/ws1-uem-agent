name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Source of truth: the go directive in go.mod. Avoids drift
          # between CI's pinned version and what the module actually
          # requires after `go mod tidy`.
          go-version-file: go.mod
          cache: true
      - name: Verify modules
        run: |
          go mod download
          go mod verify
      - name: Build
        run: make build
      - name: Vet
        run: make vet
      - name: Test (race detector + coverage)
        run: |
          go test -race -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out | tail -n 1
      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules (warm cache for typecheck)
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          # v2.x is required for go.mod >= 1.25 (v1.64 was built against
          # Go 1.24 and fails to load configs targeting newer modules).
          # Action v8 corresponds to golangci-lint v2.x.
          version: v2.11.4
